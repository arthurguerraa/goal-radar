<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FStats — Login</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=Syne:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/styles.css">
</head>
<body>

<div class="auth-page">
  <div class="auth-box">
    <div class="auth-logo">FStats</div>
    <div class="auth-title">Bem-vindo de volta</div>
    <div class="auth-sub">Faça login para acessar o dashboard de futebol</div>

    <div class="alert alert-error" id="login-error"></div>
    <div class="alert alert-success" id="login-success"></div>

    <div class="form-group">
      <label>Usuário ou E-mail</label>
      <input class="form-control" id="login-login" type="text" placeholder="seu_usuario" />
    </div>
    <div class="form-group">
      <label>Senha</label>
      <div class="password-wrap">
        <input class="form-control" id="login-pass" type="password" placeholder="••••••••"
          onkeydown="if(event.key==='Enter') doLogin()" />
        <button class="toggle-pass" onclick="togglePass('login-pass',this)">👁</button>
      </div>
    </div>

    <div style="text-align:right;margin-bottom:20px;">
      <a style="font-size:.78rem;color:var(--accent);cursor:pointer;text-decoration:none;font-weight:600"
         href="forgot.html">Esqueceu a senha?</a>
    </div>

    <button class="btn btn-primary" id="login-btn" onclick="doLogin()">
      <span>Entrar</span>
    </button>

    <div class="auth-footer">
      Não tem conta? <a href="register.html">Criar conta</a>
    </div>
  </div>
</div>

<script src="../js/api.js"></script>
<script src="../js/auth.js"></script>
<script>
  // Redireciona se já tiver sessão válida
  if (isTokenValid(getToken())) {
    window.location.href = 'dashboard.html';
  }
</script>
</body>
</html>
