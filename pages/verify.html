<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FStats — Verificar e-mail</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=Syne:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/styles.css">
</head>
<body>

<div class="auth-page">
  <div class="auth-box">
    <div class="auth-logo">FStats</div>

    <div style="text-align:center;margin-bottom:24px;">
      <div style="font-size:3rem;margin-bottom:12px;">📬</div>
      <div class="auth-title">Confirme seu e-mail</div>
      <div class="auth-sub" id="verify-sub">
        Enviamos um código de confirmação para o seu e-mail.<br>
        Cole o código abaixo para ativar sua conta.
      </div>
    </div>

    <div class="alert alert-error" id="verify-error"></div>
    <div class="alert alert-success" id="verify-success"></div>

    <div class="form-group">
      <label>Código de confirmação</label>
      <input
        class="form-control"
        id="verify-token"
        type="text"
        placeholder="Cole o código aqui"
        autocomplete="one-time-code"
        onkeydown="if(event.key==='Enter') doVerify()"
        style="font-family:'DM Mono',monospace;letter-spacing:2px;font-size:1rem;text-align:center;"
      />
    </div>

    <button class="btn btn-primary" id="verify-btn" onclick="doVerify()">
      <span>Confirmar e-mail</span>
    </button>

    <div class="divider">ou</div>

    <button class="btn btn-ghost" id="resend-btn" onclick="doResend()" style="width:100%">
      <span id="resend-label">↺ Reenviar código</span>
    </button>

    <div class="auth-footer" style="margin-top:20px;">
      <a href="login.html">← Voltar ao login</a>
    </div>
  </div>
</div>

<script src="../js/api.js"></script>
<script src="../js/auth.js"></script>
<script>
  initVerifyPage();
</script>
</body>
</html>
